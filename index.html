<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Touch Grass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container" id="appContainer">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="24" height="24">
          <path fill="#10B981" d="M16,2C8,2,2,8,2,16c0,8,14,14,14,14s14-6,14-14C30,8,24,2,16,2z"/>
          <path fill="#34D399" d="M16,2C12,6,10,12,10,16c0,5.5,4.5,10,10,10c0,0,4-6,4-10C24,10,20,4,16,2z"/>
        </svg>
        <span class="logo-text">Touch Grass</span>
      </div>
      <div class="window-controls">
        <button type="button" class="win-ctrl-btn" id="winMinimizeBtn" title="Minimize">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M19 13H5v-2h14v2z"/>
          </svg>
        </button>
        <button type="button" class="win-ctrl-btn close-btn" id="winCloseBtn" title="Close">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Content Sections -->
    <div class="content-wrapper">
      
      <!-- SCREEN 1: SETUP -->
      <section class="screen active" id="setupScreen">
        <div class="intro-text">
          <h1>Reclaim Your Focus</h1>
          <p>Configure your session and let the gentle overlay remind you to rest.</p>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector">
          <button type="button" class="mode-btn active" id="modePomodoroBtn">Pomodoro</button>
          <button type="button" class="mode-btn" id="modeCustomBtn">Custom</button>
        </div>

        <!-- Duration Settings -->
        <div class="settings-card">
          <!-- Work Duration Slider -->
          <div class="setting-group" id="workDurationGroup">
            <div class="setting-header">
              <label for="workDurationInput">Work Duration</label>
              <span class="value-display" id="workValDisplay">25 mins</span>
            </div>
            <div class="input-slider-wrapper">
              <input type="range" id="workDurationInput" min="1" max="120" value="25">
            </div>
          </div>

          <!-- Break Duration Slider -->
          <div class="setting-group" id="breakDurationGroup">
            <div class="setting-header">
              <label for="breakDurationInput">Break Duration</label>
              <span class="value-display" id="breakValDisplay">5 mins</span>
            </div>
            <div class="input-slider-wrapper">
              <input type="range" id="breakDurationInput" min="1" max="60" value="5">
            </div>
          </div>
        </div>

        <!-- Preferences Toggle Toggles -->
        <div class="preferences-card">
          <div class="preference-row">
            <div class="pref-info">
              <h3>Sound Chime</h3>
              <p>Play gentle zen bell sound at transitions</p>
            </div>
            <label class="switch-toggle">
              <input type="checkbox" id="soundToggle" checked>
              <span class="slider-toggle-round"></span>
            </label>
          </div>

          <div class="preference-row">
            <div class="pref-info">
              <h3>Zen Break Mode</h3>
              <p>Only show breath animation and timer on break</p>
            </div>
            <label class="switch-toggle">
              <input type="checkbox" id="zenToggle">
              <span class="slider-toggle-round"></span>
            </label>
          </div>
        </div>

        <!-- CTA Button -->
        <button type="button" class="btn-primary" id="startSessionBtn">
          Start Focus
        </button>
      </section>

      <!-- SCREEN 2: RUNNING -->
      <section class="screen" id="runningScreen">
        <div class="status-banner" id="statusBanner">
          <span class="pulse-indicator"></span>
          <span id="runningStatusText">Focusing</span>
        </div>

        <!-- Circular Countdown Timer -->
        <div class="timer-display-container">
          <svg class="progress-ring" width="220" height="220">
            <circle class="progress-ring-bg" stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="transparent" r="96" cx="110" cy="110"/>
            <circle class="progress-ring-fg" id="timerProgressRing" stroke="#10B981" stroke-width="8" fill="transparent" r="96" cx="110" cy="110"/>
          </svg>
          <div class="timer-value-container">
            <span class="timer-countdown" id="timerDigits">25:00</span>
            <span class="timer-label" id="timerLabel">remaining</span>
          </div>
        </div>

        <!-- Action Controls -->
        <div class="timer-controls">
          <button type="button" class="btn-secondary" id="pauseResumeBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
            <span id="pauseBtnText">Pause</span>
          </button>
          
          <button type="button" class="btn-danger" id="stopSessionBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M6 6h12v12H6V6z"/>
            </svg>
            Stop
          </button>
        </div>
      </section>
      
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
